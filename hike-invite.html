<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hike</title>
<style>
  :root{
    --night-deep:#141b32;
    --night-mid:#232f52;
    --lavender:#c9b6e4;
    --blush:#f2b6c4;
    --gold:#f4d06f;
    --cream:#fdf6ec;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{
    height:100%;
    overflow:hidden;
  }
  body{
    background: linear-gradient(180deg, var(--night-deep) 0%, var(--night-mid) 100%);
    color:var(--cream);
    font-family: Georgia, 'Times New Roman', serif;
    display:flex;
    flex-direction:column;
  }
  .sky{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }
  .star{
    position:absolute; border-radius:50%; background:var(--cream);
    animation: twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:.25; transform:scale(.8);}
    50%{opacity:1; transform:scale(1.15);}
  }
  .firefly{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background:var(--gold); filter: blur(1px);
    box-shadow:0 0 8px 3px rgba(244,208,111,0.6);
    animation: drift 14s ease-in-out infinite;
  }
  @keyframes drift{
    0%{transform:translate(0,0);}
    25%{transform:translate(30px,-40px);}
    50%{transform:translate(-20px,-70px);}
    75%{transform:translate(-40px,-20px);}
    100%{transform:translate(0,0);}
  }

  /* stage holds the two "screens" and stacks them on top of each other
     so only one is ever visible - this is what removes the scrolling */
  .stage{
    position:relative;
    flex:1 1 auto;
    min-height:0;
  }
  .stage section{
    position:absolute;
    inset:0;
    z-index:1;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:4vh 6vw;
    overflow-y:auto;
  }
  .stage section.visible{ display:flex; }

  .eyebrow{
    font-family: 'Trebuchet MS', sans-serif;
    letter-spacing:.35em;
    text-transform:uppercase;
    font-size:.7rem;
    color:var(--lavender);
    margin-bottom:1.4rem;
    opacity:.85;
  }
  h1{
    font-size:clamp(1.7rem, 5vw, 3.2rem);
    font-weight:400;
    line-height:1.25;
    max-width:16ch;
    font-style:italic;
  }
  .sub{
    margin-top:1.4rem;
    font-family:'Trebuchet MS', sans-serif;
    font-size:1rem;
    color:var(--lavender);
    opacity:.8;
    max-width:32ch;
  }

  /* final ask */
  .ask h1{ max-width:14ch; }
  .buttons{
    margin-top:2.6rem;
    display:flex; gap:1.4rem; align-items:center;
    position:relative;
    height:70px;
  }
  button{
    font-family:'Trebuchet MS', sans-serif;
    font-size:1rem;
    letter-spacing:.03em;
    border-radius:999px;
    border:none;
    cursor:pointer;
    padding:1rem 2.2rem;
    transition:transform .18s ease, padding .18s ease, font-size .18s ease, box-shadow .3s ease;
  }
  .yes{
    background:var(--blush);
    color:#3a1420;
    box-shadow:0 0 24px rgba(242,182,196,.45);
    font-weight:bold;
  }
  .yes:hover{ transform:scale(1.05); }
  .no{
    background:transparent;
    color:var(--lavender);
    border:1px solid rgba(201,182,228,.5);
    position:absolute;
  }

  .bloom{
    position:relative;
    font-size:clamp(1.8rem, 5.5vw, 3rem);
    font-style:italic;
    color:var(--blush);
  }
  .petal{
    position:absolute;
    top:50%; left:50%;
    width:8px; height:14px;
    background:var(--blush);
    border-radius:50%;
    opacity:0;
    animation: burst 1.8s ease-out forwards;
  }
  @keyframes burst{
    0%{ opacity:1; transform:translate(-50%,-50%) rotate(var(--rot)) translateY(0) scale(.6); }
    100%{ opacity:0; transform:translate(-50%,-50%) rotate(var(--rot)) translateY(-160px) scale(1.1); }
  }

  footer{
    position:relative; z-index:1;
    flex:0 0 auto;
    text-align:center; padding:.9rem 0;
    font-family:'Trebuchet MS', sans-serif;
    font-size:.7rem;
    color:var(--lavender);
    opacity:.5;
    letter-spacing:.08em;
  }

  .date-picker{
    margin-top:.2rem;
    width:100%;
    max-width:620px;
  }
  .date-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:.7rem;
    margin-top:1.1rem;
  }
  @media (max-width:560px){
    .date-grid{ grid-template-columns:1fr; }
  }
  .date-opt{
    font-family:'Trebuchet MS', sans-serif;
    font-size:.85rem;
    text-align:left;
    color:var(--cream);
    background:rgba(253,246,236,.06);
    border:1px solid rgba(201,182,228,.35);
    border-radius:14px;
    padding:.8rem .95rem;
    cursor:pointer;
    transition: background .2s ease, transform .15s ease, border-color .2s ease;
  }
  .date-opt::before{
    content: attr(data-icon);
    margin-right:.55rem;
  }
  .date-opt:hover{
    background:rgba(242,182,196,.14);
    border-color:var(--blush);
    transform:translateY(-2px);
  }
  .date-opt.selected{
    background:var(--blush);
    color:#3a1420;
    border-color:var(--blush);
    font-weight:bold;
  }
  .summary-card{
    display:none;
    margin-top:1.6rem;
    width:100%;
    max-width:440px;
    background:rgba(253,246,236,.05);
    border:1px solid rgba(201,182,228,.3);
    border-radius:18px;
    padding:1.3rem 1.6rem;
    text-align:left;
  }
  .summary-card.active{ display:block; }
  .summary-line{
    font-family:'Trebuchet MS', sans-serif;
    font-size:.9rem;
    color:var(--cream);
    opacity:.9;
    margin-top:.5rem;
  }
  .summary-line:first-of-type{ margin-top:.8rem; }
  .summary-label{
    color:var(--lavender);
    font-weight:bold;
    margin-right:.3rem;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<div class="stage">

  <section class="ask visible" id="askSection">
    <p class="eyebrow">some journeys become unforgettable because of the person walking beside us</p>
    <h1>Would you like to come hiking with me?</h1>
    <div class="buttons" id="buttonsWrap">
      <button class="yes" id="yesBtn">Yes</button>
      <button class="no" id="noBtn" style="left:150px;">No</button>
    </div>
  </section>

  <section class="celebrate" id="celebrateSection">
    <div class="bloom" id="bloom">she said yes.</div>
    <p class="sub" style="margin-top:1rem;">good. now, one more question —</p>

    <div class="date-picker" id="datePicker">
      <p class="eyebrow" style="margin-top:1.6rem;">pick one</p>
      <div class="date-grid">
        <button class="date-opt" data-date="Mt. Batulao" data-icon="🌿">Mt. Batulao</button>
        <button class="date-opt" data-date="Dingalan, Aurora" data-icon="🌿">Dingalan, Aurora</button>
        <button class="date-opt" data-date="Kayapa Trilogy" data-icon="🌿">Kayapa Trilogy</button>
        <button class="date-opt" data-date="Nasugbu Trilogy" data-icon="🌿">Nasugbu Trilogy</button>
        <button class="date-opt" data-date="Mt. Ulap" data-icon="🌿">Mt. Ulap</button>
        <button class="date-opt" data-date="Nagpatong Rock" data-icon="🌿">Mt. Nagpatong Rock</button>
        <button class="date-opt" data-date="Mt. 387" data-icon="🌿">Mt. 387</button>
        <button class="date-opt" data-date="Surprise me" data-icon="🎲">You choose — surprise me</button>
      </div>
    </div>

    <div class="summary-card" id="summaryCard">
      <p class="eyebrow">the recap</p>
      <p class="summary-line"><span class="summary-label">Question:</span> Would you like to come hiking with me?</p>
      <p class="summary-line"><span class="summary-label">Your answer:</span> Yes </p>
      <p class="summary-line"><span class="summary-label">First hike:</span> <span id="summaryDate">—</span></p>
    </div>
  </section>

</div>

<footer>come hike with me</footer>

<script>
  // starfield
  const sky = document.getElementById('sky');
  const starCount = 90;
  for(let i=0;i<starCount;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*2 + 1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDelay = (Math.random()*3.5)+'s';
    sky.appendChild(s);
  }
  const fireflyCount = 8;
  for(let i=0;i<fireflyCount;i++){
    const f = document.createElement('div');
    f.className = 'firefly';
    f.style.left = Math.random()*100+'vw';
    f.style.top = Math.random()*100+'vh';
    f.style.animationDelay = (Math.random()*10)+'s';
    f.style.animationDuration = (10+Math.random()*8)+'s';
    sky.appendChild(f);
  }

  // dodge button
  const noBtn = document.getElementById('noBtn');
  const buttonsWrap = document.getElementById('buttonsWrap');
  const yesBtn = document.getElementById('yesBtn');
  let dodgeCount = 0;
  function dodge(){
    dodgeCount++;
    const wrapRect = buttonsWrap.getBoundingClientRect();
    const maxX = Math.max(wrapRect.width - 90, 40);
    const maxY = Math.max(wrapRect.height - 20, 10);
    const newX = Math.random()*maxX;
    const newY = (Math.random()-0.5) * maxY;
    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';
    const scale = Math.min(1 + dodgeCount*0.08, 1.6);
    yesBtn.style.transform = `scale(${scale})`;
    noBtn.style.opacity = Math.max(1 - dodgeCount*0.12, 0.35);
  }
  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('click', (e)=>{ e.preventDefault(); dodge(); });
  noBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); dodge(); });

  // yes -> swap screens (no scrolling, just a view swap)
  const askSection = document.getElementById('askSection');
  const celebrateSection = document.getElementById('celebrateSection');
  yesBtn.addEventListener('click', ()=>{
    askSection.classList.remove('visible');
    celebrateSection.classList.add('visible');
    burstPetals();
    const summaryDodges = document.getElementById('summaryDodges');
    if(dodgeCount > 0 && summaryDodges){
      summaryDodges.textContent = `(after making "no" run away ${dodgeCount} time${dodgeCount>1?'s':''})`;
    }
  });

  // date type picker
  const dateOpts = document.querySelectorAll('.date-opt');
  const summaryCard = document.getElementById('summaryCard');
  const summaryDate = document.getElementById('summaryDate');
  dateOpts.forEach(opt=>{
    opt.addEventListener('click', ()=>{
      dateOpts.forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
      summaryDate.textContent = opt.dataset.date;
      summaryCard.classList.add('active');
    });
  });

  function burstPetals(){
    const bloom = document.getElementById('bloom');
    for(let i=0;i<24;i++){
      const p = document.createElement('div');
      p.className = 'petal';
      const angle = Math.random()*360;
      p.style.setProperty('--rot', angle+'deg');
      p.style.animationDelay = (Math.random()*0.4)+'s';
      p.style.background = i % 2 === 0 ? 'var(--blush)' : 'var(--gold)';
      bloom.appendChild(p);
    }
  }
</script>

</body>
</html>
